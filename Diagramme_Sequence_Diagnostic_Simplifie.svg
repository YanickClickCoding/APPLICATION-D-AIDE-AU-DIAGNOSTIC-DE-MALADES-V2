<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 2200" width="1000" height="2200">
  <defs>
    <style>
      .actor-box { fill: #4A90E2; stroke: #2E5C8A; stroke-width: 2; }
      .actor-text { fill: white; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
      .lifeline { stroke: #666; stroke-width: 2; stroke-dasharray: 5,5; }
      .activation { fill: #E8F4F8; stroke: #4A90E2; stroke-width: 2; }
      .message-arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .return-arrow { stroke: #666; stroke-width: 2; fill: none; stroke-dasharray: 5,5; marker-end: url(#arrowhead-return); }
      .message-text { fill: #333; font-family: Arial, sans-serif; font-size: 12px; }
      .note-box { fill: #FFF9C4; stroke: #F57C00; stroke-width: 1; }
      .note-text { fill: #333; font-family: Arial, sans-serif; font-size: 11px; }
      .title { fill: #2C3E50; font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; text-anchor: middle; }
      .subtitle { fill: #555; font-family: Arial, sans-serif; font-size: 14px; text-anchor: middle; }
      .section-label { fill: #E74C3C; font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
      .alt-box { fill: none; stroke: #E74C3C; stroke-width: 2; }
      .alt-label { fill: white; font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; }
      .alt-label-bg { fill: #E74C3C; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
    <marker id="arrowhead-return" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="40" class="title">DIAGRAMME DE SEQUENCE - DIAGNOSTIC MEDICAL IA</text>
  <text x="500" y="65" class="subtitle">Système de Diagnostic Assisté par Intelligence Artificielle (Version Simplifiée)</text>
  <line x1="50" y1="75" x2="950" y2="75" stroke="#2C3E50" stroke-width="2"/>

  <!-- Actors -->
  <!-- Médecin -->
  <rect x="100" y="100" width="120" height="50" class="actor-box" rx="5"/>
  <text x="160" y="130" class="actor-text">MEDECIN</text>
  <line x1="160" y1="150" x2="160" y2="2100" class="lifeline"/>

  <!-- Système -->
  <rect x="340" y="100" width="120" height="50" class="actor-box" rx="5"/>
  <text x="400" y="130" class="actor-text">SYSTEME</text>
  <line x1="400" y1="150" x2="400" y2="2100" class="lifeline"/>

  <!-- Modèle IA -->
  <rect x="580" y="100" width="120" height="50" class="actor-box" rx="5"/>
  <text x="640" y="125" class="actor-text">Modèle IA</text>
  <text x="640" y="140" class="actor-text">Random Forest</text>
  <line x1="640" y1="150" x2="640" y2="2100" class="lifeline"/>

  <!-- Base de données -->
  <rect x="780" y="100" width="120" height="50" class="actor-box" rx="5"/>
  <text x="840" y="125" class="actor-text">Base de</text>
  <text x="840" y="140" class="actor-text">Données MySQL</text>
  <line x1="840" y1="150" x2="840" y2="2100" class="lifeline"/>

  <!-- PHASE 1: Préparation de la consultation -->
  <text x="70" y="200" class="section-label">PHASE 1: PREPARATION DE LA CONSULTATION</text>
  
  <!-- Message 1: Accéder à la page consultation -->
  <line x1="160" y1="220" x2="400" y2="220" class="message-arrow"/>
  <text x="240" y="215" class="message-text">1. Accéder à la page consultation</text>
  
  <!-- Activation Système -->
  <rect x="390" y="220" width="20" height="80" class="activation"/>
  
  <!-- Message 2: Récupérer liste patients -->
  <line x1="400" y1="240" x2="840" y2="240" class="message-arrow"/>
  <text x="580" y="235" class="message-text">2. Récupérer liste patients</text>
  
  <!-- Return: Liste patients -->
  <line x1="840" y1="260" x2="400" y2="260" class="return-arrow"/>
  <text x="580" y="255" class="message-text">Liste patients</text>
  
  <!-- Return: Afficher patients -->
  <line x1="400" y1="280" x2="160" y2="280" class="return-arrow"/>
  <text x="240" y="275" class="message-text">Afficher liste patients</text>
  
  <!-- Message 3: Sélectionner patient -->
  <line x1="160" y1="310" x2="400" y2="310" class="message-arrow"/>
  <text x="240" y="305" class="message-text">3. Sélectionner patient</text>
  
  <!-- PHASE 2: Saisie des données médicales -->
  <text x="70" y="350" class="section-label">PHASE 2: SAISIE DES DONNEES MEDICALES</text>
  
  <!-- Message 4: Remplir formulaire -->
  <line x1="160" y1="370" x2="400" y2="370" class="message-arrow"/>
  <text x="240" y="365" class="message-text">4. Remplir formulaire diagnostic</text>
  
  <!-- Note: Données saisies -->
  <rect x="50" y="385" width="250" height="80" class="note-box" rx="3"/>
  <text x="60" y="405" class="note-text">Données saisies:</text>
  <text x="60" y="420" class="note-text">- Symptômes (liste multiple)</text>
  <text x="60" y="435" class="note-text">- Signes vitaux (température, tension, etc.)</text>
  <text x="60" y="450" class="note-text">- Antécédents médicaux</text>
  <text x="60" y="465" class="note-text">- Examens complémentaires</text>
  
  <!-- Activation Système -->
  <rect x="390" y="370" width="20" height="120" class="activation"/>
  
  <!-- Message 5: Valider formulaire -->
  <line x1="160" y1="490" x2="400" y2="490" class="message-arrow"/>
  <text x="240" y="485" class="message-text">5. Soumettre formulaire</text>
  
  <!-- Message 6: Validation données -->
  <line x1="400" y1="510" x2="400" y2="530" class="message-arrow"/>
  <text x="420" y="520" class="message-text">6. Valider données</text>
  
  <!-- PHASE 3: Traitement et diagnostic IA -->
  <text x="70" y="560" class="section-label">PHASE 3: TRAITEMENT ET DIAGNOSTIC IA</text>
  
  <!-- Activation Système -->
  <rect x="390" y="580" width="20" height="420" class="activation"/>
  
  <!-- Message 7: Créer consultation -->
  <line x1="400" y1="600" x2="840" y2="600" class="message-arrow"/>
  <text x="580" y="595" class="message-text">7. Créer consultation</text>
  
  <!-- Return: ID consultation -->
  <line x1="840" y1="620" x2="400" y2="620" class="return-arrow"/>
  <text x="580" y="615" class="message-text">consultation_id</text>
  
  <!-- Message 8: Préparer données pour IA -->
  <line x1="400" y1="640" x2="400" y2="660" class="message-arrow"/>
  <text x="420" y="650" class="message-text">8. Préparer features</text>
  
  <!-- Note: Préparation features -->
  <rect x="430" y="675" width="220" height="70" class="note-box" rx="3"/>
  <text x="440" y="695" class="note-text">Transformation des données:</text>
  <text x="440" y="710" class="note-text">- Encodage symptômes (one-hot)</text>
  <text x="440" y="725" class="note-text">- Normalisation signes vitaux</text>
  <text x="440" y="740" class="note-text">- Vecteur de features (43 dimensions)</text>
  
  <!-- Message 9: Appel modèle IA -->
  <line x1="400" y1="760" x2="640" y2="760" class="message-arrow"/>
  <text x="480" y="755" class="message-text">9. Demander prédiction</text>
  
  <!-- Activation IA -->
  <rect x="630" y="760" width="20" height="120" class="activation"/>
  
  <!-- Message 10: Traitement Random Forest -->
  <line x1="640" y1="780" x2="640" y2="800" class="message-arrow"/>
  <text x="660" y="790" class="message-text">10. Analyse par arbres</text>
  
  <!-- Note: Modèle IA -->
  <rect x="670" y="815" width="200" height="55" class="note-box" rx="3"/>
  <text x="680" y="835" class="note-text">Random Forest (100 arbres)</text>
  <text x="680" y="850" class="note-text">- Prédiction maladie</text>
  <text x="680" y="865" class="note-text">- Score de confiance (0-1)</text>
  
  <!-- Return: Résultat prédiction -->
  <line x1="640" y1="880" x2="400" y2="880" class="return-arrow"/>
  <text x="480" y="875" class="message-text">Prédiction + confiance</text>
  
  <!-- Message 11: Enrichir résultat -->
  <line x1="400" y1="900" x2="400" y2="920" class="message-arrow"/>
  <text x="420" y="910" class="message-text">11. Enrichir diagnostic</text>
  
  <!-- Message 12: Sauvegarder diagnostic -->
  <line x1="400" y1="940" x2="840" y2="940" class="message-arrow"/>
  <text x="580" y="935" class="message-text">12. Sauvegarder diagnostic</text>
  
  <!-- Return: Confirmation -->
  <line x1="840" y1="960" x2="400" y2="960" class="return-arrow"/>
  <text x="580" y="955" class="message-text">diagnostic_id</text>
  
  <!-- Return: Résultat au médecin -->
  <line x1="400" y1="1000" x2="160" y2="1000" class="return-arrow"/>
  <text x="240" y="995" class="message-text">Afficher diagnostic IA</text>
  
  <!-- PHASE 4: Affichage et validation -->
  <text x="70" y="1040" class="section-label">PHASE 4: VALIDATION MEDICALE</text>
  
  <!-- Note: Résultat affiché -->
  <rect x="50" y="1060" width="250" height="95" class="note-box" rx="3"/>
  <text x="60" y="1080" class="note-text">Résultat affiché:</text>
  <text x="60" y="1095" class="note-text">- Maladie prédite</text>
  <text x="60" y="1110" class="note-text">- Score de confiance (%)</text>
  <text x="60" y="1125" class="note-text">- Symptômes analysés</text>
  <text x="60" y="1140" class="note-text">- Recommandations</text>
  <text x="60" y="1155" class="note-text">- Examens suggérés</text>
  
  <!-- Message 13: Analyser résultat -->
  <line x1="160" y1="1175" x2="160" y2="1195" class="message-arrow"/>
  <text x="180" y="1185" class="message-text">13. Analyser diagnostic IA</text>
  
  <!-- Alternative: Validation ou modification -->
  <rect x="100" y="1215" width="450" height="380" class="alt-box" rx="5"/>
  <rect x="100" y="1215" width="120" height="25" class="alt-label-bg" rx="5"/>
  <text x="160" y="1232" class="alt-label">ALT [Décision médicale]</text>
  
  <!-- Cas 1: Validation -->
  <text x="120" y="1265" class="note-text" font-weight="bold">[Diagnostic validé]</text>
  
  <!-- Message 14a: Valider diagnostic -->
  <line x1="160" y1="1285" x2="400" y2="1285" class="message-arrow"/>
  <text x="240" y="1280" class="message-text">14a. Valider diagnostic IA</text>
  
  <!-- Activation Système -->
  <rect x="390" y="1285" width="20" height="60" class="activation"/>
  
  <!-- Message 15a: UPDATE diagnostic -->
  <line x1="400" y1="1305" x2="840" y2="1305" class="message-arrow"/>
  <text x="580" y="1300" class="message-text">15a. Marquer comme validé</text>
  
  <!-- Return: Confirmation -->
  <line x1="840" y1="1325" x2="160" y2="1325" class="return-arrow"/>
  <text x="460" y="1320" class="message-text">Confirmation validation</text>
  
  <!-- Séparateur -->
  <line x1="110" y1="1355" x2="540" y2="1355" stroke="#E74C3C" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Cas 2: Modification -->
  <text x="120" y="1385" class="note-text" font-weight="bold">[Diagnostic modifié]</text>
  
  <!-- Message 14b: Modifier diagnostic -->
  <line x1="160" y1="1405" x2="400" y2="1405" class="message-arrow"/>
  <text x="240" y="1400" class="message-text">14b. Modifier diagnostic</text>
  
  <!-- Activation Système -->
  <rect x="390" y="1405" width="20" height="80" class="activation"/>
  
  <!-- Message 15b: Saisir corrections -->
  <line x1="160" y1="1425" x2="400" y2="1425" class="message-arrow"/>
  <text x="240" y="1420" class="message-text">15b. Saisir corrections</text>
  
  <!-- Message 16b: UPDATE diagnostic -->
  <line x1="400" y1="1445" x2="840" y2="1445" class="message-arrow"/>
  <text x="580" y="1440" class="message-text">16b. Mettre à jour diagnostic</text>
  
  <!-- Return: Confirmation -->
  <line x1="840" y1="1465" x2="160" y2="1465" class="return-arrow"/>
  <text x="460" y="1460" class="message-text">Confirmation modification</text>
  
  <!-- Séparateur -->
  <line x1="110" y1="1495" x2="540" y2="1495" stroke="#E74C3C" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Cas 3: Rejet -->
  <text x="120" y="1525" class="note-text" font-weight="bold">[Diagnostic rejeté]</text>
  
  <!-- Message 14c: Rejeter diagnostic -->
  <line x1="160" y1="1545" x2="400" y2="1545" class="message-arrow"/>
  <text x="240" y="1540" class="message-text">14c. Rejeter diagnostic IA</text>
  
  <!-- Activation Système -->
  <rect x="390" y="1545" width="20" height="40" class="activation"/>
  
  <!-- Message 15c: DELETE diagnostic -->
  <line x1="400" y1="1565" x2="840" y2="1565" class="message-arrow"/>
  <text x="580" y="1560" class="message-text">15c. Supprimer diagnostic</text>
  
  <!-- Return: Confirmation -->
  <line x1="840" y1="1585" x2="160" y2="1585" class="return-arrow"/>
  <text x="460" y="1580" class="message-text">Confirmation suppression</text>
  
  <!-- PHASE 5: Prescription et suivi -->
  <text x="70" y="1625" class="section-label">PHASE 5: PRESCRIPTION ET SUIVI</text>
  
  <!-- Message 16: Créer prescription -->
  <line x1="160" y1="1645" x2="400" y2="1645" class="message-arrow"/>
  <text x="240" y="1640" class="message-text">16. Créer prescription</text>
  
  <!-- Activation Système -->
  <rect x="390" y="1645" width="20" height="80" class="activation"/>
  
  <!-- Message 17: Sauvegarder prescription -->
  <line x1="400" y1="1665" x2="840" y2="1665" class="message-arrow"/>
  <text x="580" y="1660" class="message-text">17. Sauvegarder prescription</text>
  
  <!-- Message 18: Lier à consultation -->
  <line x1="400" y1="1685" x2="840" y2="1685" class="message-arrow"/>
  <text x="580" y="1680" class="message-text">18. Lier à consultation</text>
  
  <!-- Return: Confirmation -->
  <line x1="840" y1="1705" x2="160" y2="1705" class="return-arrow"/>
  <text x="460" y="1700" class="message-text">Prescription créée</text>
  
  <!-- PHASE 6: Génération de rapports -->
  <text x="70" y="1745" class="section-label">PHASE 6: GENERATION DE RAPPORTS</text>
  
  <!-- Message 19: Demander rapport -->
  <line x1="160" y1="1765" x2="400" y2="1765" class="message-arrow"/>
  <text x="240" y="1760" class="message-text">19. Générer rapport PDF</text>
  
  <!-- Activation Système -->
  <rect x="390" y="1765" width="20" height="120" class="activation"/>
  
  <!-- Message 20: Récupérer données complètes -->
  <line x1="400" y1="1785" x2="840" y2="1785" class="message-arrow"/>
  <text x="580" y="1780" class="message-text">20. Récupérer données consultation</text>
  
  <!-- Return: Données -->
  <line x1="840" y1="1805" x2="400" y2="1805" class="return-arrow"/>
  <text x="580" y="1800" class="message-text">Données complètes</text>
  
  <!-- Message 21: Générer PDF -->
  <line x1="400" y1="1825" x2="400" y2="1845" class="message-arrow"/>
  <text x="420" y="1835" class="message-text">21. Générer PDF</text>
  
  <!-- Return: PDF -->
  <line x1="400" y1="1865" x2="160" y2="1865" class="return-arrow"/>
  <text x="240" y="1860" class="message-text">Télécharger rapport</text>
  
  <!-- PHASE 7: Suivi et amélioration -->
  <text x="70" y="1905" class="section-label">PHASE 7: APPRENTISSAGE CONTINU</text>
  
  <!-- Note: Amélioration du modèle -->
  <rect x="320" y="1925" width="300" height="85" class="note-box" rx="3"/>
  <text x="330" y="1945" class="note-text" font-weight="bold">Amélioration continue du modèle:</text>
  <text x="330" y="1960" class="note-text">• Les diagnostics validés/modifiés par les médecins</text>
  <text x="330" y="1975" class="note-text">• Servent à réentraîner le modèle périodiquement</text>
  <text x="330" y="1990" class="note-text">• Amélioration de la précision au fil du temps</text>
  <text x="330" y="2005" class="note-text">• Adaptation aux spécificités locales</text>
  
  <!-- Note finale: Statistiques -->
  <rect x="50" y="2030" width="900" height="70" class="note-box" rx="5"/>
  <text x="70" y="2055" class="note-text" font-weight="bold">INFORMATIONS TECHNIQUES:</text>
  <text x="70" y="2075" class="note-text">• Modèle IA: Random Forest (100 arbres) - Précision: 95% - 9 maladies détectables</text>
  <text x="70" y="2090" class="note-text">• Technologies: FastAPI (Python 3.11), React (TypeScript), MySQL 8.0, Scikit-learn 1.3</text>
  
  <!-- Footer -->
  <line x1="50" y1="2110" x2="950" y2="2110" stroke="#2C3E50" stroke-width="2"/>
  <text x="500" y="2135" class="subtitle">Système SANTE PLUS - Clinique de Cotonou, Bénin</text>
  <text x="500" y="2155" class="subtitle">© 2026 - Diagramme de Séquence UML 2.5 (Version Simplifiée)</text>

</svg>