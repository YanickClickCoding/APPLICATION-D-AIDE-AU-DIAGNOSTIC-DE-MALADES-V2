<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fond bleu médical -->
  <rect width="100" height="100" fill="#0A4B8C" rx="20"/>
  
  <!-- Croix médicale blanche -->
  <g fill="white">
    <!-- Barre verticale -->
    <rect x="42" y="20" width="16" height="60" rx="2"/>
    <!-- Barre horizontale -->
    <rect x="20" y="42" width="60" height="16" rx="2"/>
  </g>
  
  <!-- Cercle central pour effet stéthoscope -->
  <circle cx="50" cy="50" r="12" fill="none" stroke="white" stroke-width="2.5"/>
  
  <!-- Petit point central -->
  <circle cx="50" cy="50" r="4" fill="white"/>
</svg>
