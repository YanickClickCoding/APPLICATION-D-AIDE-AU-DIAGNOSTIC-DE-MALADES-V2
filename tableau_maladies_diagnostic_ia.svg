<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800">
  <!-- Définition des styles -->
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #2c3e50; }
      .subtitle { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #34495e; }
      .header { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: white; }
      .cell-text { font-family: Arial, sans-serif; font-size: 12px; fill: #2c3e50; }
      .cell-small { font-family: Arial, sans-serif; font-size: 10px; fill: #555; }
      .header-bg { fill: #3498db; }
      .row-even { fill: #ecf0f1; }
      .row-odd { fill: #ffffff; }
      .border { stroke: #bdc3c7; stroke-width: 1; }
    </style>
  </defs>
  
  <!-- Titre principal -->
  <text x="700" y="35" text-anchor="middle" class="title">Tableau Récapitulatif — Diagnostic IA (153 maladies)</text>
  <text x="700" y="60" text-anchor="middle" class="subtitle">9 Cas de Test pour Validation du Système</text>
  
  <!-- En-tête du tableau -->
  <rect x="20" y="80" width="60" height="40" class="header-bg border"/>
  <text x="50" y="105" text-anchor="middle" class="header">#</text>
  
  <rect x="80" y="80" width="180" height="40" class="header-bg border"/>
  <text x="170" y="105" text-anchor="middle" class="header">Patient</text>
  
  <rect x="260" y="80" width="220" height="40" class="header-bg border"/>
  <text x="370" y="105" text-anchor="middle" class="header">Maladie Attendue</text>
  
  <rect x="480" y="80" width="120" height="40" class="header-bg border"/>
  <text x="540" y="105" text-anchor="middle" class="header">Confiance</text>
  
  <rect x="600" y="80" width="780" height="40" class="header-bg border"/>
  <text x="990" y="105" text-anchor="middle" class="header">Signe Distinctif</text>
  
  <!-- Ligne 1 - Paludisme -->
  <rect x="20" y="120" width="60" height="70" class="row-odd border"/>
  <text x="50" y="160" text-anchor="middle" class="cell-text">1</text>
  
  <rect x="80" y="120" width="180" height="70" class="row-odd border"/>
  <text x="170" y="150" text-anchor="middle" class="cell-text">Koffi AGOSSOU</text>
  <text x="170" y="165" text-anchor="middle" class="cell-small">(fourni)</text>
  
  <rect x="260" y="120" width="220" height="70" class="row-odd border"/>
  <text x="370" y="155" text-anchor="middle" class="cell-text" font-weight="bold">Paludisme / Malaria</text>
  
  <rect x="480" y="120" width="120" height="70" class="row-odd border"/>
  <text x="540" y="155" text-anchor="middle" class="cell-text" font-weight="bold">&gt; 70%</text>
  
  <rect x="600" y="120" width="780" height="70" class="row-odd border"/>
  <text x="610" y="145" class="cell-text">Frottis + TDR positifs, fièvre 39.8°C</text>
  <text x="610" y="165" class="cell-small">Thrombopénie, splénomégalie</text>
  
  <!-- Ligne 2 - Pneumonie -->
  <rect x="20" y="190" width="60" height="70" class="row-even border"/>
  <text x="50" y="230" text-anchor="middle" class="cell-text">2</text>
  
  <rect x="80" y="190" width="180" height="70" class="row-even border"/>
  <text x="170" y="220" text-anchor="middle" class="cell-text">Armelle HOUNSOU</text>
  
  <rect x="260" y="190" width="220" height="70" class="row-even border"/>
  <text x="370" y="225" text-anchor="middle" class="cell-text" font-weight="bold">Pneumonie</text>
  
  <rect x="480" y="190" width="120" height="70" class="row-even border"/>
  <text x="540" y="225" text-anchor="middle" class="cell-text" font-weight="bold">&gt; 65%</text>
  
  <rect x="600" y="190" width="780" height="70" class="row-even border"/>
  <text x="610" y="215" class="cell-text">SpO₂ 93%, condensation radio lobe inf. droit, FR 26</text>
  <text x="610" y="235" class="cell-small">Hyperleucocytose 18000, neutrophiles 85%, CRP 142</text>
  
  <!-- Ligne 3 - Dengue -->
  <rect x="20" y="260" width="60" height="70" class="row-odd border"/>
  <text x="50" y="300" text-anchor="middle" class="cell-text">3</text>
  
  <rect x="80" y="260" width="180" height="70" class="row-odd border"/>
  <text x="170" y="290" text-anchor="middle" class="cell-text">Franck DOSSOU</text>
  
  <rect x="260" y="260" width="220" height="70" class="row-odd border"/>
  <text x="370" y="295" text-anchor="middle" class="cell-text" font-weight="bold">Dengue</text>
  
  <rect x="480" y="260" width="120" height="70" class="row-odd border"/>
  <text x="540" y="295" text-anchor="middle" class="cell-text" font-weight="bold">&gt; 65%</text>
  
  <rect x="600" y="260" width="780" height="70" class="row-odd border"/>
  <text x="610" y="285" class="cell-text">Thrombopénie 62000, rash, GE négatif (élimine paludisme)</text>
  <text x="610" y="305" class="cell-small">Leucopénie 3200, douleurs musculaires sévères, fièvre brutale</text>
  
  <!-- Ligne 4 - Diabète Type 2 -->
  <rect x="20" y="330" width="60" height="70" class="row-even border"/>
  <text x="50" y="370" text-anchor="middle" class="cell-text">4</text>
  
  <rect x="80" y="330" width="180" height="70" class="row-even border"/>
  <text x="170" y="360" text-anchor="middle" class="cell-text">Geneviève AMOUSSOU</text>
  
  <rect x="260" y="330" width="220" height="70" class="row-even border"/>
  <text x="370" y="365" text-anchor="middle" class="cell-text" font-weight="bold">Diabète Type 2</text>
  
  <rect x="480" y="330" width="120" height="70" class="row-even border"/>
  <text x="540" y="365" text-anchor="middle" class="cell-text" font-weight="bold">&gt; 75%</text>
  
  <rect x="600" y="330" width="780" height="70" class="row-even border"/>
  <text x="610" y="355" class="cell-text">Glycémie 14.2 mmol/L, HbA1c 9.8%, polydipsie/polyurie</text>
  <text x="610" y="375" class="cell-small">IMC 33.7 (obésité), HTA associée 145/88, vision floue</text>
  
  <!-- Ligne 5 - Tuberculose -->
  <rect x="20" y="400" width="60" height="70" class="row-odd border"/>
  <text x="50" y="440" text-anchor="middle" class="cell-text">5</text>
  
  <rect x="80" y="400" width="180" height="70" class="row-odd border"/>
  <text x="170" y="430" text-anchor="middle" class="cell-text">Sébastien KPENOU</text>
  
  <rect x="260" y="400" width="220" height="70" class="row-odd border"/>
  <text x="370" y="435" text-anchor="middle" class="cell-text" font-weight="bold">Tuberculose</text>
  
  <rect x="480" y="400" width="120" height="70" class="row-odd border"/>
  <text x="540" y="435" text-anchor="middle" class="cell-text" font-weight="bold">&gt; 70%</text>
  
  <rect x="600" y="400" width="780" height="70" class="row-odd border"/>
  <text x="610" y="425" class="cell-text">BAAR 3+, cavernes apicales bilatérales, hémoptysie</text>
  <text x="610" y="445" class="cell-small">Perte 8 kg en 2 mois, sueurs nocturnes, IMC 18.3</text>
  
  <!-- Ligne 6 - Hépatite B -->
  <rect x="20" y="470" width="60" height="70" class="row-even border"/>
  <text x="50" y="510" text-anchor="middle" class="cell-text">6</text>
  
  <rect x="80" y="470" width="180" height="70" class="row-even border"/>
  <text x="170" y="500" text-anchor="middle" class="cell-text">Romuald TCHEGNON</text>
  
  <rect x="260" y="470" width="220" height="70" class="row-even border"/>
  <text x="370" y="505" text-anchor="middle" class="cell-text" font-weight="bold">Hépatite B</text>
  
  <rect x="480" y="470" width="120" height="70" class="row-even border"/>
  <text x="540" y="505" text-anchor="middle" class="cell-text" font-weight="bold">&gt; 65%</text>
  
  <rect x="600" y="470" width="780" height="70" class="row-even border"/>
  <text x="610" y="495" class="cell-text">ALAT 856 UI/L (cytolyse majeure), ictère, bilirubine 148</text>
  <text x="610" y="515" class="cell-small">Urines foncées, douleurs hypochondre droit</text>
  
  <!-- Ligne 7 - Hypertension -->
  <rect x="20" y="540" width="60" height="70" class="row-odd border"/>
  <text x="50" y="580" text-anchor="middle" class="cell-text">7</text>
  
  <rect x="80" y="540" width="180" height="70" class="row-odd border"/>
  <text x="170" y="570" text-anchor="middle" class="cell-text">Bernadette ZANNOU</text>
  
  <rect x="260" y="540" width="220" height="70" class="row-odd border"/>
  <text x="370" y="575" text-anchor="middle" class="cell-text" font-weight="bold">Hypertension</text>
  
  <rect x="480" y="540" width="120" height="70" class="row-odd border"/>
  <text x="540" y="575" text-anchor="middle" class="cell-text" font-weight="bold">&gt; 70%</text>
  
  <rect x="600" y="540" width="780" height="70" class="row-odd border"/>
  <text x="610" y="565" class="cell-text">TA 185/112 mmHg (crise hypertensive), HVG ECG</text>
  <text x="610" y="585" class="cell-small">Céphalées en casque, vertiges, IMC 32.5</text>
  
  <!-- Ligne 8 - Insuffisance Cardiaque -->
  <rect x="20" y="610" width="60" height="70" class="row-even border"/>
  <text x="50" y="650" text-anchor="middle" class="cell-text">8</text>
  
  <rect x="80" y="610" width="180" height="70" class="row-even border"/>
  <text x="170" y="640" text-anchor="middle" class="cell-text">Maurice AHOUANDJINOU</text>
  
  <rect x="260" y="610" width="220" height="70" class="row-even border"/>
  <text x="370" y="640" text-anchor="middle" class="cell-text" font-weight="bold">Insuffisance cardiaque</text>
  
  <rect x="480" y="610" width="120" height="70" class="row-even border"/>
  <text x="540" y="645" text-anchor="middle" class="cell-text" font-weight="bold">&gt; 65%</text>
  
  <rect x="600" y="610" width="780" height="70" class="row-even border"/>
  <text x="610" y="635" class="cell-text">SpO₂ 91%, œdèmes MI, cardiomégalie, FA, épanchement pleural</text>
  <text x="610" y="655" class="cell-small">Prise 6 kg en 3 sem, dyspnée NYHA III, FC 112</text>
  
  <!-- Ligne 9 - Anémie ferriprive -->
  <rect x="20" y="680" width="60" height="70" class="row-odd border"/>
  <text x="50" y="720" text-anchor="middle" class="cell-text">9</text>
  
  <rect x="80" y="680" width="180" height="70" class="row-odd border"/>
  <text x="170" y="710" text-anchor="middle" class="cell-text">Prisca HONFO</text>
  
  <rect x="260" y="680" width="220" height="70" class="row-odd border"/>
  <text x="370" y="715" text-anchor="middle" class="cell-text" font-weight="bold">Anémie ferriprive</text>
  
  <rect x="480" y="680" width="120" height="70" class="row-odd border"/>
  <text x="540" y="715" text-anchor="middle" class="cell-text" font-weight="bold">&gt; 70%</text>
  
  <rect x="600" y="680" width="780" height="70" class="row-odd border"/>
  <text x="610" y="705" class="cell-text">Hb 6.2 g/dL (sévère), ferritine 4 µg/L, tachycardie 110</text>
  <text x="610" y="725" class="cell-small">Microcytaire hypochrome VGM 62, pâleur, fatigue extrême</text>
  
  <!-- Note de bas de page -->
  <text x="20" y="775" class="cell-small" font-style="italic">
    Note : Pour TB (cas 5) et Hépatite B (cas 6), une confiance 50-65% est acceptable si la maladie apparaît dans le top 3 des diagnostics alternatifs.
  </text>
  
  <!-- Légende -->
  <rect x="1200" y="20" width="180" height="60" fill="#e8f4f8" stroke="#3498db" stroke-width="2"/>
  <text x="1290" y="40" text-anchor="middle" class="cell-text" font-weight="bold">Légende</text>
  <text x="1210" y="58" class="cell-small">Confiance : Probabilité IA</text>
  <text x="1210" y="72" class="cell-small">153 maladies dans le modèle</text>
</svg>
