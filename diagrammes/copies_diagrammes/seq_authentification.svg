<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="910" viewBox="0 0 980 910" font-family="Arial, Helvetica, sans-serif">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
  </marker>
  <marker id="arr-open" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="white" stroke="#555" stroke-width="1"/>
  </marker>
  <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="white" stroke="#CC0000" stroke-width="1"/>
  </marker>
  <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="white" stroke="#D79B00" stroke-width="1"/>
  </marker>
</defs>

<!-- Background -->
<rect width="980" height="910" fill="#FAFAFA"/>

<!-- Title -->
<text x="490" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Diagramme de Séquence — Authentification (Login / Logout)</text>

<!-- ═══ Participant Boxes ═══ -->
<rect x="45"  y="35" width="160" height="42" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.5"/>
<text x="125" y="61" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Utilisateur</text>

<rect x="265" y="35" width="160" height="42" fill="#D5E8D4" stroke="#82B366" stroke-width="1.5"/>
<text x="345" y="61" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Frontend React</text>

<rect x="485" y="35" width="160" height="42" fill="#FFE6CC" stroke="#D79B00" stroke-width="1.5"/>
<text x="565" y="61" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Backend FastAPI</text>

<rect x="705" y="35" width="160" height="42" fill="#F8CECC" stroke="#B85450" stroke-width="1.5"/>
<text x="785" y="61" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Base de Données</text>

<!-- ═══ Lifelines ═══ -->
<line x1="125" y1="77" x2="125" y2="905" stroke="#6C8EBF" stroke-width="1" stroke-dasharray="6,4"/>
<line x1="345" y1="77" x2="345" y2="905" stroke="#82B366" stroke-width="1" stroke-dasharray="6,4"/>
<line x1="565" y1="77" x2="565" y2="905" stroke="#D79B00" stroke-width="1" stroke-dasharray="6,4"/>
<line x1="785" y1="77" x2="785" y2="905" stroke="#B85450" stroke-width="1" stroke-dasharray="6,4"/>

<!-- ═══ Alt Frame — Erreurs auth ═══ -->
<rect x="440" y="278" width="370" height="110" fill="#FFF5F5" fill-opacity="0.7" stroke="#CC0000" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="446" y="292" font-size="9" font-weight="bold" fill="#CC0000">alt  [Erreurs d'authentification]</text>

<!-- ═══ Activation Bars (THE KEY ADDITION) ═══ -->
<!-- Backend — login : reçoit POST (y=198) → envoie 200 OK (y=462) -->
<rect x="559" y="198" width="12" height="264" fill="white" stroke="#D79B00" stroke-width="1.5"/>
<!-- DB — SELECT query : reçoit (y=230) → retourne (y=262) -->
<rect x="779" y="230" width="12" height="32"  fill="white" stroke="#B85450" stroke-width="1.5"/>
<!-- Backend — logout : reçoit POST (y=742) → envoie 200 OK (y=772) -->
<rect x="559" y="742" width="12" height="30"  fill="white" stroke="#D79B00" stroke-width="1.5"/>

<!-- ═══════════════════════════════════════════════ -->
<!--                 SECTION CONNEXION               -->
<!-- ═══════════════════════════════════════════════ -->
<text x="490" y="101" text-anchor="middle" font-size="10" font-style="italic" fill="#555">— Connexion —</text>

<!-- 1. U → F : Saisit email + mot de passe -->
<line x1="125" y1="118" x2="340" y2="118" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="233" y="113" text-anchor="middle" font-size="9" fill="#333">1. Saisit email + mot de passe</text>

<!-- 2. F self-loop : Valide format -->
<path d="M 345,150 L 425,150 L 425,172 L 345,172" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="429" y="163" font-size="9" fill="#333">2. Valide format (email + longueur mot de passe)</text>

<!-- 3. F → B : POST /api/auth/login -->
<line x1="345" y1="198" x2="559" y2="198" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="452" y="193" text-anchor="middle" font-size="9" fill="#333">3. POST /api/auth/login  { email, password }</text>

<!-- 4. B → DB : SELECT -->
<line x1="571" y1="230" x2="779" y2="230" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="675" y="225" text-anchor="middle" font-size="9" fill="#333">4. SELECT utilisateur WHERE email = ?</text>

<!-- 5. DB → B : retour données -->
<line x1="779" y1="262" x2="576" y2="262" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-open)"/>
<text x="677" y="257" text-anchor="middle" font-size="9" fill="#555">5. Données utilisateur (ou null)</text>

<!-- 6a. B → F : 401 introuvable  [dans alt frame] -->
<line x1="559" y1="305" x2="345" y2="305" stroke="#CC0000" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
<text x="452" y="300" text-anchor="middle" font-size="9" fill="#CC0000">6a. 401 Unauthorized  [utilisateur introuvable]</text>

<!-- 6b. B → F : 403 désactivé -->
<line x1="559" y1="330" x2="345" y2="330" stroke="#D79B00" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
<text x="452" y="325" text-anchor="middle" font-size="9" fill="#D79B00">6b. 403 Forbidden  [compte désactivé]</text>

<!-- 6c. B → F : 401 mot de passe -->
<line x1="559" y1="358" x2="345" y2="358" stroke="#CC0000" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
<text x="452" y="353" text-anchor="middle" font-size="9" fill="#CC0000">6c. 401 Unauthorized  [mot de passe incorrect]</text>

<!-- 7. B self-loop : verify_password + create_access_token -->
<path d="M 571,408 L 655,408 L 655,436 L 571,436" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="659" y="418" font-size="9" fill="#333">7. verify_password(plain, hash)</text>
<text x="659" y="430" font-size="9" fill="#333">    create_access_token() — JWT HS256, exp 24h</text>

<!-- 8. B → F : 200 OK { access_token, user } -->
<line x1="559" y1="462" x2="345" y2="462" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-open)"/>
<text x="452" y="457" text-anchor="middle" font-size="9" fill="#555">8. 200 OK  { access_token, token_type, role, user_id, nom }</text>

<!-- 9. F self-loop : localStorage -->
<path d="M 345,496 L 435,496 L 435,525 L 345,525" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="439" y="506" font-size="9" fill="#333">9. localStorage.setItem('sp_token', token)</text>
<text x="439" y="518" font-size="9" fill="#333">    localStorage.setItem('sp_user', user)</text>

<!-- 10. F self-loop : AuthContext -->
<path d="M 345,546 L 435,546 L 435,568 L 345,568" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="439" y="561" font-size="9" fill="#333">10. AuthContext.setUser(user)  isAuthenticated = true</text>

<!-- 11. F → U : Redirection selon rôle -->
<line x1="345" y1="594" x2="130" y2="594" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-open)"/>
<text x="237" y="589" text-anchor="middle" font-size="9" fill="#555">11. Redirection selon rôle</text>

<!-- Note : destinations par rôle -->
<rect x="30" y="606" width="195" height="62" fill="#FFF2CC" stroke="#D6B656" stroke-width="1"/>
<polygon points="30,606 44,606 44,620 30,620" fill="#E6C030"/>
<text x="36" y="620" font-size="9" fill="#555">admin     → /admin-system</text>
<text x="36" y="633" font-size="9" fill="#555">médecin   → /dashboard-medecin</text>
<text x="36" y="646" font-size="9" fill="#555">infirmier → /consultations</text>
<text x="36" y="659" font-size="9" fill="#888">(selon rôle dans le payload JWT)</text>

<!-- ═══ Séparateur ═══ -->
<line x1="25" y1="678" x2="955" y2="678" stroke="#AAAAAA" stroke-width="1" stroke-dasharray="4,4"/>

<!-- ═══════════════════════════════════════════════ -->
<!--               SECTION DÉCONNEXION               -->
<!-- ═══════════════════════════════════════════════ -->
<text x="490" y="698" text-anchor="middle" font-size="10" font-style="italic" fill="#555">— Déconnexion —</text>

<!-- 12. U → F : Clique Déconnexion -->
<line x1="125" y1="710" x2="340" y2="710" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="233" y="705" text-anchor="middle" font-size="9" fill="#333">12. Clique sur « Déconnexion »</text>

<!-- 13. F → B : POST /api/auth/logout -->
<line x1="345" y1="742" x2="559" y2="742" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="452" y="737" text-anchor="middle" font-size="9" fill="#333">13. POST /api/auth/logout</text>

<!-- 14. B → F : 200 OK (stateless) -->
<line x1="559" y1="772" x2="345" y2="772" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-open)"/>
<text x="452" y="767" text-anchor="middle" font-size="9" fill="#555">14. 200 OK  (JWT stateless — pas de blacklist côté serveur)</text>

<!-- 15. F self-loop : Nettoyage -->
<path d="M 345,802 L 435,802 L 435,824 L 345,824" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="439" y="817" font-size="9" fill="#333">15. localStorage.clear()  AuthContext.reset()</text>

<!-- 16. F → U : Redirect /login -->
<line x1="345" y1="855" x2="130" y2="855" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-open)"/>
<text x="237" y="850" text-anchor="middle" font-size="9" fill="#555">16. Redirection → /login</text>

<!-- Note : token expiré -->
<rect x="810" y="838" width="155" height="52" fill="#F8CECC" stroke="#B85450" stroke-width="1"/>
<polygon points="810,838 824,838 824,852 810,852" fill="#C08080"/>
<text x="816" y="852" font-size="9" fill="#555">Token expiré (24h) :</text>
<text x="816" y="864" font-size="9" fill="#555">→ 401 auto-detected</text>
<text x="816" y="876" font-size="9" fill="#555">→ Redirect /login?expired</text>

</svg>
