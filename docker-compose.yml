version: "3.9"

# =============================================================================
#  GASA SAD - Stack complète Docker
#  Usage : docker compose up --build
#  Acces :
#    - Frontend  : http://localhost:3000
#    - Backend   : http://localhost:8000
#    - API Docs  : http://localhost:8000/docs
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: gasa_sad_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sante_plus_ia
      MYSQL_USER: gasa_user
      MYSQL_PASSWORD: gasa_password
    ports:
      - "3307:3306"          # 3307 pour ne pas conflicter avec MySQL local
    volumes:
      - mysql_data:/var/lib/mysql
      - ./gasa_sad_ia _v2.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./catalogue_medicaments.sql:/docker-entrypoint-initdb.d/02_catalogue.sql
      - ./medicaments.sql:/docker-entrypoint-initdb.d/03_medicaments.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gasa_sad_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://gasa_user:gasa_password@db:3306/sante_plus_ia
      SECRET_KEY: ${SECRET_KEY:-changez-cette-cle-en-production-32-chars-minimum}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 180
      MODEL_PATH: ./ml_models/
      DATASET_PATH: ./datasets/
      MIN_CONFIDENCE_THRESHOLD: "0.6"
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
      LOG_LEVEL: INFO
      DEBUG: "false"
    ports:
      - "8000:8000"
    volumes:
      - ml_models:/app/ml_models
      - ./les ressources dataset:/app/datasets:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
    container_name: gasa_sad_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

  # ---------------------------------------------------------------------------
  # Entrainement du modele ML (service one-shot, ne demarre qu'une fois)
  train-model:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gasa_sad_train
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://gasa_user:gasa_password@db:3306/sante_plus_ia
      DATASET_PATH: ./datasets/
      MODEL_PATH: ./ml_models/
    volumes:
      - ml_models:/app/ml_models
      - ./les ressources dataset:/app/datasets:ro
    command: python train_initial_model.py
    profiles:
      - train          # Lance avec : docker compose --profile train up train-model

volumes:
  mysql_data:
  ml_models:
